<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر عبدو شعراوي</title>
    <style>
        /* إعدادات الألوان الأساسية */
        :root {
            --bg-color: #111111;
            --surface-color: #1a1a1a;
            --primary-color: #f7d75c; /* أصفر فاتح */
            --primary-hover: #e0c24d;
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
            --border-color: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* الهيدر وشريط البحث */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background-color: var(--surface-color);
            border-bottom: 2px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu-btn {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 1000;
        }

        .menu-btn div {
            width: 30px;
            height: 3px;
            background-color: var(--primary-color);
            border-radius: 5px;
        }

        .search-container input {
            background: #000;
            border: 1px solid var(--border-color);
            color: var(--text-light);
            padding: 8px 15px;
            border-radius: 20px;
            outline: none;
            width: 150px;
        }

        .search-container input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(247, 215, 92, 0.2);
            width: 200px;
        }

        /* القائمة الجانبية (Sidebar) */
        .sidebar {
            position: fixed;
            top: 0;
            right: -300px;
            width: 250px;
            height: 100vh;
            background-color: #000000;
            padding-top: 80px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            z-index: 99;
        }

        .sidebar.active {
            right: 0;
        }

        .sidebar a {
            display: block;
            padding: 15px 25px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 1.2rem;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar a:hover {
            background-color: var(--surface-color);
            color: var(--primary-color);
            padding-right: 35px;
        }

        /* المحتوى الأساسي */
        .main-content {
            padding: 30px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2.section-title {
            color: var(--primary-color);
            margin-bottom: 25px;
            font-size: 2rem;
            border-right: 4px solid var(--primary-color);
            padding-right: 15px;
        }

        /* تصميم النماذج والكروت */
        .card {
            background-color: var(--surface-color);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .form-group input[type="text"],
        .form-group select,
        .form-group input[type="file"] {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-light);
            border-radius: 6px;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary-color);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        button.btn {
            background-color: var(--primary-color);
            color: #000;
            border: none;
            padding: 15px 20px;
            width: 100%;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
        }

        button.btn:hover {
            background-color: var(--primary-hover);
            transform: scale(1.02);
        }

        /* شبكة العروض */
        .offers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .offer-card {
            background-color: var(--surface-color);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .offer-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 2px solid var(--primary-color);
        }

        .offer-details {
            padding: 15px;
        }

        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .badge.buy { background-color: #e74c3c; color: white; }
        .badge.sell { background-color: #2ecc71; color: white; }

        .discord-btn {
            display: inline-block;
            background-color: #5865F2;
            color: white;
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            width: 100%;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <!-- الهيدر -->
    <header>
        <div class="menu-btn" onclick="toggleSidebar()">
            <div></div>
            <div></div>
            <div></div>
        </div>
        <h2 style="color: var(--primary-color); letter-spacing: 1px;">Shaarawy Store</h2>
        <div class="search-container">
            <input type="text" id="masterSearch" placeholder="بحث...">
        </div>
    </header>

    <!-- القائمة الجانبية -->
    <div class="sidebar" id="sidebar">
        <a href="#" onclick="showSection('offers')">العروض (Offers)</a>
        <a href="#" onclick="showSection('orders')">الطلب (Orders)</a>
        <a href="#" onclick="showSection('contact')">تواصل معنا (Contact Us)</a>
    </div>

    <!-- المحتوى -->
    <div class="main-content">

        <!-- 1. قسم العروض -->
        <section id="offers" class="section active">
            <h2 class="section-title">أحدث العروض والطلبات</h2>
            <div class="offers-grid" id="offersContainer">
                <p style="text-align: center; color: var(--text-muted); width: 100%;">جاري تحميل البيانات...</p>
            </div>
        </section>

        <!-- 2. قسم الأوردرات -->
        <section id="orders" class="section">
            <h2 class="section-title">إرسال طلب جديد</h2>
            <div class="card">
                <div class="form-group">
                    <label>الحاجة اللي عايزها (المنتج/الخدمة):</label>
                    <input type="text" id="orderItem" placeholder="اكتب طلبك هنا..." required>
                </div>
                <div class="form-group">
                    <label>يوزر الديسكورد بتاعك:</label>
                    <input type="text" id="discordUser" placeholder="مثال: User#1234 أو Username" required>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="acceptMiddleman">
                    <label for="acceptMiddleman" style="margin:0;">أقبل وسيط (Middleman)</label>
                </div>
                <button class="btn" onclick="sendOrder()">Order Now</button>
            </div>
        </section>

        <!-- 3. قسم التواصل -->
        <section id="contact" class="section">
            <h2 class="section-title">تواصل معنا</h2>
            <div class="card" style="text-align: center;">
                <h3 style="margin-bottom: 15px;">حياكم الله في سيرفرنا</h3>
                <p style="color: var(--text-muted); margin-bottom: 20px;">للدعم الفني والاستفسارات المباشرة</p>
                <!-- ضع رابط سيرفر الديسكورد هنا -->
                <a href="رابط_سيرفر_الديسكورد_هنا" class="discord-btn" target="_blank">الانضمام لسيرفر ديسكورد</a>
            </div>
        </section>

        <!-- 4. لوحة تحكم الأدمن (تظهر فقط بالكلمة السرية) -->
        <section id="admin" class="section">
            <h2 class="section-title" style="color: #e74c3c;">لوحة تحكم المالك</h2>
            <div class="card">
                <div class="form-group">
                    <label>النوع:</label>
                    <select id="offerType">
                        <option value="sell">أنا ببيع (Selling)</option>
                        <option value="buy">أنا محتاج (Buying)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>اسم أو نوع الشيء:</label>
                    <input type="text" id="offerTitle" placeholder="مثال: حساب لعبة، توكنات، إلخ...">
                </div>
                <div class="form-group">
                    <label>صورة الشيء:</label>
                    <input type="file" id="offerImage" accept="image/*">
                    <small style="color: var(--text-muted);">سيتم تحويل الصورة ورفعها مباشرة</small>
                </div>
                <button class="btn" onclick="addOffer()" style="background-color: #e74c3c; color: white;">رفع العرض</button>
            </div>
        </section>

    </div>

    <script>
        // الروابط الأساسية (قم بتعديل رابط الويب هوك)
        const FIREBASE_URL = "https://web-abdo-default-rtdb.firebaseio.com/offers.json";
        const WEBHOOK_URL = "رابط_الويب_هوك_هنا";

        // التحكم في القائمة الجانبية
        const sidebar = document.getElementById('sidebar');
        function toggleSidebar() {
            sidebar.classList.toggle('active');
        }

        // التنقل بين الأقسام
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            sidebar.classList.remove('active');
            
            if(sectionId === 'offers') loadOffers();
        }

        // نظام البحث لفتح لوحة الأدمن
        document.getElementById('masterSearch').addEventListener('input', function(e) {
            if(e.target.value === 'Abdo9090') {
                showSection('admin');
                e.target.value = ''; 
                alert('مرحباً بك يا عبدو! تم فتح لوحة التحكم بنجاح.');
            }
        });

        // تحويل الصورة إلى Base64 لسهولة الرفع لـ Firebase
        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        // رفع العرض (لوحة التحكم)
        async function addOffer() {
            const type = document.getElementById('offerType').value;
            const title = document.getElementById('offerTitle').value;
            const imageFile = document.getElementById('offerImage').files[0];

            if(!title || !imageFile) {
                alert("يرجى ملء جميع البيانات واختيار صورة!");
                return;
            }

            const btn = document.querySelector('#admin .btn');
            btn.innerText = "جاري الرفع...";

            try {
                const imageBase64 = await getBase64(imageFile);
                const offerData = { type, title, image: imageBase64, date: new Date().toISOString() };

                await fetch(FIREBASE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(offerData)
                });

                alert("تم رفع العرض بنجاح!");
                document.getElementById('offerTitle').value = '';
                document.getElementById('offerImage').value = '';
                btn.innerText = "رفع العرض";
                showSection('offers');
            } catch (error) {
                console.error("خطأ:", error);
                alert("حدث خطأ أثناء الرفع.");
                btn.innerText = "رفع العرض";
            }
        }

        // جلب العروض من Firebase وعرضها
        async function loadOffers() {
            const container = document.getElementById('offersContainer');
            try {
                const response = await fetch(FIREBASE_URL);
                const data = await response.json();
                
                container.innerHTML = ''; // تنظيف الحاوية
                
                if(!data) {
                    container.innerHTML = '<p style="color:var(--text-muted); text-align:center; width:100%;">لا توجد عروض حالياً.</p>';
                    return;
                }

                // ترتيب العروض من الأحدث للأقدم
                const offersArray = Object.keys(data).map(key => data[key]).reverse();

                offersArray.forEach(offer => {
                    const badgeClass = offer.type === 'sell' ? 'sell' : 'buy';
                    const badgeText = offer.type === 'sell' ? 'للبيـــع' : 'مطلـــوب';
                    
                    container.innerHTML += `
                        <div class="offer-card">
                            <img src="${offer.image}" alt="Offer Image">
                            <div class="offer-details">
                                <span class="badge ${badgeClass}">${badgeText}</span>
                                <h3 style="font-size:1.2rem; margin-bottom:10px;">${offer.title}</h3>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                container.innerHTML = '<p style="color:red;">فشل في تحميل البيانات من قاعدة البيانات.</p>';
            }
        }

        // إرسال الأوردر للويب هوك
        function sendOrder() {
            const item = document.getElementById('orderItem').value;
            const discordUser = document.getElementById('discordUser').value;
            const acceptMiddleman = document.getElementById('acceptMiddleman').checked ? '✅ نعم، يقبل وسيط' : '❌ لا يقبل وسيط';

            if(!item || !discordUser) {
                alert("يرجى كتابة طلبك ويوزر الديسكورد الخاص بك!");
                return;
            }

            // التأكد من وضع رابط الويب هوك
            if(WEBHOOK_URL.includes("رابط_الويب_هوك")) {
                alert("يرجى إضافة رابط الويب هوك الخاص بك في كود الجافاسكريبت أولاً!");
                return;
            }

            const payload = {
                username: "Shaarawy Store Bot",
                avatar_url: "https://i.imgur.com/AfFp7pu.png",
                embeds: [{
                    title: "🛒 طلب شراء/خدمة جديد",
                    color: 16242524, // أصفر
                    fields: [
                        { name: "الطلب", value: item, inline: false },
                        { name: "يوزر المشتري", value: discordUser, inline: true },
                        { name: "الوسيط", value: acceptMiddleman, inline: true }
                    ],
                    footer: { text: "تم الإرسال من الموقع الرسمي" },
                    timestamp: new Date()
                }]
            };

            const btn = document.querySelector('#orders .btn');
            btn.innerText = "جاري الإرسال...";

            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                alert("تم إرسال طلبك بنجاح! سيتم التواصل معك عبر ديسكورد.");
                document.getElementById('orderItem').value = '';
                document.getElementById('discordUser').value = '';
                document.getElementById('acceptMiddleman').checked = false;
                btn.innerText = "Order Now";
            }).catch(err => {
                alert("حدث خطأ أثناء الإرسال.");
                btn.innerText = "Order Now";
                console.error(err);
            });
        }

        // تحميل العروض عند فتح الصفحة لأول مرة
        window.onload = loadOffers;

    </script>
</body>
</html>
